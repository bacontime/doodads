<img id="heightmapImage" src="world-heightmap-noaa-etopo5.png" width="1080" height="540" alt="" hidden>
<script>
const WIDTH = 1080;
const HEIGHT = 540;
const MIN_ELEV = -9027;
const MAX_ELEV = 9027;
const LEVEL_ACTIONS = [
  { label: "-1000m", delta: -1000 },
  { label: "-100m", delta: -100 },
  { label: "-10m", delta: -10 },
  { label: "Reset Sea Level", level: 0 },
  { label: "+10m", delta: 10 },
  { label: "+100m", delta: 100 },
  { label: "+1000m", delta: 1000 }
];
const SLIDER_STEP = 10;
const LIGHT_ANGLE = Math.atan2(0.8, 0.6);
const LIGHT_INTENSITY = 1 / 1000;
const LIGHT_BASE = 1.0;
const LIGHT_MIN = 0.58;
const LIGHT_MAX = 1.18;
const LIGHT_SCALE = 256;
const LIGHT_X = Math.cos(LIGHT_ANGLE);
const LIGHT_Y = Math.sin(LIGHT_ANGLE);
const ELEVATION_RANGE = MAX_ELEV - MIN_ELEV + 1;
const RGB_STRIDE = 3;
const WATER_DEPTH_LUT_MAX = 11000;
const LAND_HEIGHT_LUT_MAX = 8500;

const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d", { alpha: false });
const image = ctx.createImageData(WIDTH, HEIGHT);
const heightmapImage = document.getElementById("heightmapImage");
const levelRange = document.getElementById("levelRange");
const levelInput = document.getElementById("levelInput");
const invertToggle = document.getElementById("invertToggle");
const levelText = document.getElementById("levelText");
const modeText = document.getElementById("modeText");
const waterText = document.getElementById("waterText");
const landText = document.getElementById("landText");
const presets = document.getElementById("presets");
const cursorText = document.getElementById("cursorText");
const waterRamp = document.querySelector(".ramp.water");
const landRamp = document.querySelector(".ramp.land");
const waterScaleTicks = document.getElementById("waterScaleTicks");
const landScaleTicks = document.getElementById("landScaleTicks");
let currentSea = 0;
let isInverted = false;
let elevations = null;
let invertedElevations = null;
let shade = null;
let invertedShade = null;
let rowWeights = null;
let waterCoverByLevel = null;
let invertedWaterCoverByLevel = null;
let waterColorLut = null;
let landColorLut = null;
let exposedLandColorLut = null;
let totalWeight = 0;
let pendingSea = 0;
let renderFrame = 0;

initializeImageAlpha();

function decodeHeightmapImage(img) {
  if (img.naturalWidth !== WIDTH || img.naturalHeight !== HEIGHT) {
    throw new Error(`Expected heightmap ${WIDTH}x${HEIGHT}, got ${img.naturalWidth}x${img.naturalHeight}`);
  }
  const dataCanvas = document.createElement("canvas");
  dataCanvas.width = WIDTH;
  dataCanvas.height = HEIGHT;
  const dataCtx = dataCanvas.getContext("2d", { willReadFrequently: true });
  dataCtx.drawImage(img, 0, 0);
  const pixels = dataCtx.getImageData(0, 0, WIDTH, HEIGHT).data;
  const values = new Int16Array(WIDTH * HEIGHT);
  for (let i = 0, p = 0; i < values.length; i++, p += 4) {
    values[i] = ((pixels[p] << 8) | pixels[p + 1]) - 32768;
  }
  return values;
}

function initializeImageAlpha() {
  const pixels = image.data;
  for (let p = 3; p < pixels.length; p += 4) {
    pixels[p] = 255;
  }
}

function prepareDerivedData() {
  const cellCount = WIDTH * HEIGHT;
  invertedElevations = new Int16Array(cellCount);
  shade = new Uint16Array(cellCount);
  invertedShade = new Uint16Array(cellCount);
  rowWeights = new Float32Array(HEIGHT);
  const normalElevationWeights = new Float64Array(ELEVATION_RANGE);
  const invertedElevationWeights = new Float64Array(ELEVATION_RANGE);
  totalWeight = 0;

  for (let y = 0; y < HEIGHT; y++) {
    const lat = 90 - ((y + 0.5) / HEIGHT) * 180;
    const weight = Math.max(0.01, Math.cos(lat * Math.PI / 180));
    rowWeights[y] = weight;
    totalWeight += weight * WIDTH;
  }

  for (let y = 0; y < HEIGHT; y++) {
    const ym = Math.max(0, y - 1);
    const yp = Math.min(HEIGHT - 1, y + 1);
    for (let x = 0; x < WIDTH; x++) {
      const xm = (x + WIDTH - 1) % WIDTH;
      const xp = (x + 1) % WIDTH;
      const idx = y * WIDTH + x;
      const elev = elevations[idx];
      const invertedElev = -elev;
      const dx = elevations[y * WIDTH + xp] - elevations[y * WIDTH + xm];
      const dy = elevations[yp * WIDTH + x] - elevations[ym * WIDTH + x];
      invertedElevations[idx] = invertedElev;
      normalElevationWeights[elevationIndex(elev)] += rowWeights[y];
      invertedElevationWeights[elevationIndex(invertedElev)] += rowWeights[y];
      shade[idx] = calculateLightScale(dx, dy, 1);
      invertedShade[idx] = calculateLightScale(dx, dy, -1);
    }
  }

  waterCoverByLevel = buildWaterCoverLookup(normalElevationWeights);
  invertedWaterCoverByLevel = buildWaterCoverLookup(invertedElevationWeights);
}

function calculateLightScale(dx, dy, direction) {
  // const slope = Math.sqrt(dx * dx + dy * dy);
  // const slopeShade = Math.min(0.12, slope / 70000);
  const directionalLight = (dx * LIGHT_X + dy * LIGHT_Y) * LIGHT_INTENSITY * direction;
  return Math.round(clamp(LIGHT_BASE + directionalLight, LIGHT_MIN, LIGHT_MAX) * LIGHT_SCALE);
  // return Math.round(clamp(LIGHT_BASE + directionalLight - slopeShade, LIGHT_MIN, LIGHT_MAX) * LIGHT_SCALE);
}

function elevationIndex(elev) {
  return Math.min(ELEVATION_RANGE - 1, Math.max(0, elev - MIN_ELEV));
}

function buildWaterCoverLookup(elevationWeights) {
  const lookup = new Float32Array(ELEVATION_RANGE);
  let coveredWeight = 0;
  for (let i = 0; i < ELEVATION_RANGE; i++) {
    coveredWeight += elevationWeights[i];
    lookup[i] = (coveredWeight / totalWeight) * 100;
  }
  return lookup;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function mix(a, b, t) {
  return Math.round(a + (b - a) * t);
}

const waterStops = [
  { depth: 0, rgb: [166, 221, 224] },
  { depth: 50, rgb: [94, 177, 193] },
  { depth: 1000, rgb: [16, 105, 139] },
  { depth: 3000, rgb: [8, 70, 108] },
  { depth: 6000, rgb: [8, 48, 89] },
  { depth: WATER_DEPTH_LUT_MAX, rgb: [4, 19, 36] }
];

const landStops = [
  // { height: 0, rgb: [82, 129, 75] },
  { height: 0, rgb: [61, 117, 67] },
  { height: 800, rgb: [104, 133, 70] },
  { height: 2000, rgb: [142, 134, 99] },
  { height: 3000, rgb: [173, 169, 154] },
  { height: 4000, rgb: [220, 223, 216] },
  { height: LAND_HEIGHT_LUT_MAX, rgb: [247, 248, 243] }
];

function prepareColorLuts() {
  waterColorLut = new Uint8Array((WATER_DEPTH_LUT_MAX + 1) * RGB_STRIDE);
  landColorLut = new Uint8Array((LAND_HEIGHT_LUT_MAX + 1) * RGB_STRIDE);
  exposedLandColorLut = new Uint8Array((LAND_HEIGHT_LUT_MAX + 1) * RGB_STRIDE);

  for (let depth = 0; depth <= WATER_DEPTH_LUT_MAX; depth++) {
    const rgb = rampByDepth(waterStops, depth);
    writeColorLut(waterColorLut, depth, rgb);
  }

  for (let height = 0; height <= LAND_HEIGHT_LUT_MAX; height++) {
    const rgb = rampByHeight(landStops, height);
    writeColorLut(landColorLut, height, rgb);
    writeColorLut(exposedLandColorLut, height, [
      mix(rgb[0], 198, 0.28),
      mix(rgb[1], 174, 0.28),
      mix(rgb[2], 123, 0.28)
    ]);
  }

  renderColormapLegends();
}

function rampByDepth(stops, depth) {
  if (depth <= stops[0].depth) return stops[0].rgb;
  for (let i = 0; i < stops.length - 1; i++) {
    const a = stops[i];
    const b = stops[i + 1];
    if (depth <= b.depth) {
      const local = (depth - a.depth) / (b.depth - a.depth);
      return [mix(a.rgb[0], b.rgb[0], local), mix(a.rgb[1], b.rgb[1], local), mix(a.rgb[2], b.rgb[2], local)];
    }
  }
  return stops[stops.length - 1].rgb;
}

function rampByHeight(stops, height) {
  if (height <= stops[0].height) return stops[0].rgb;
  for (let i = 0; i < stops.length - 1; i++) {
    const a = stops[i];
    const b = stops[i + 1];
    if (height <= b.height) {
      const local = (height - a.height) / (b.height - a.height);
      return [mix(a.rgb[0], b.rgb[0], local), mix(a.rgb[1], b.rgb[1], local), mix(a.rgb[2], b.rgb[2], local)];
    }
  }
  return stops[stops.length - 1].rgb;
}

function renderColormapLegends() {
  if (waterRamp) waterRamp.style.background = buildWaterLegendGradient();
  if (landRamp) landRamp.style.background = buildLandLegendGradient();
  renderScaleTicks(waterScaleTicks, waterStops, (stop) => (1 - stop.depth / WATER_DEPTH_LUT_MAX) * 100, (stop) => formatScaleDistance(stop.depth));
  renderScaleTicks(landScaleTicks, landStops, (stop) => (stop.height / LAND_HEIGHT_LUT_MAX) * 100, (stop) => formatScaleDistance(stop.height));
}

function renderScaleTicks(container, stops, positionFor, labelFor) {
  if (!container) return;
  container.replaceChildren();

  for (const stop of stops) {
    if (stop.depth === 0 || stop.height === 0) continue;
    const position = clamp(positionFor(stop), 0, 100);
    const label = labelFor(stop);
    const tick = document.createElement("div");
    tick.className = "scale-tick";
    if (position <= 4) tick.classList.add("edge-start");
    if (position >= 96) tick.classList.add("edge-end");
    tick.style.setProperty("--position", `${formatPercent(position)}`);
    tick.dataset.label = label;
    tick.title = label;
    container.appendChild(tick);
  }
}

function buildWaterLegendGradient() {
  const samples = 12;
  const stops = [];
  for (let i = 0; i < samples; i++) {
    const position = i / (samples - 1);
    const depth = Math.round((1 - position) * WATER_DEPTH_LUT_MAX);
    stops.push(`${lutColorCss(waterColorLut, depth)} ${formatPercent(position * 100)}`);
  }
  return `linear-gradient(90deg, ${stops.join(", ")})`;
}

function buildLandLegendGradient() {
  const stops = landStops.map((stop) => {
    const position = (stop.height / LAND_HEIGHT_LUT_MAX) * 100;
    return `${rgbCss(stop.rgb)} ${formatPercent(position)}`;
  });
  return `linear-gradient(90deg, ${stops.join(", ")})`;
}

function lutColorCss(lut, index) {
  const p = index * RGB_STRIDE;
  return rgbCss([lut[p], lut[p + 1], lut[p + 2]]);
}

function rgbCss(rgb) {
  return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
}

function formatMeters(value) {
  return `${value.toLocaleString()} m`;
}

function formatScaleDistance(value) {
  if (Math.abs(value) >= 1000) {
    return `${Number((value / 1000).toFixed(1))} km`;
  }
  return formatMeters(value);
}

function formatPercent(value) {
  return `${Number(value.toFixed(2))}%`;
}

function writeColorLut(lut, index, rgb) {
  const p = index * RGB_STRIDE;
  lut[p] = rgb[0];
  lut[p + 1] = rgb[1];
  lut[p + 2] = rgb[2];
}

function render(sea) {
  if (!elevations) return;
  const pixels = image.data;
  const activeElevations = isInverted ? invertedElevations : elevations;
  const activeShade = isInverted ? invertedShade : shade;
  const waterLookup = isInverted ? invertedWaterCoverByLevel : waterCoverByLevel;
  const seaIndex = elevationIndex(sea);
  const seaBelowZero = sea < 0;

  for (let idx = 0, p = 0; idx < activeElevations.length; idx++, p += 4) {
    const elev = activeElevations[idx];
    const light = activeShade[idx];
    let lut;
    let colorIndex;

    if (elev <= sea) {
      const depth = sea - elev;
      colorIndex = Math.min(WATER_DEPTH_LUT_MAX, depth) * RGB_STRIDE;
      lut = waterColorLut;
    } else {
      const heightAboveSea = elev - sea;
      colorIndex = Math.min(LAND_HEIGHT_LUT_MAX, heightAboveSea) * RGB_STRIDE;
      lut = seaBelowZero && elev < 0 ? exposedLandColorLut : landColorLut;
    }

    pixels[p] = (lut[colorIndex] * light + 128) >> 8;
    pixels[p + 1] = (lut[colorIndex + 1] * light + 128) >> 8;
    pixels[p + 2] = (lut[colorIndex + 2] * light + 128) >> 8;
  }

  ctx.putImageData(image, 0, 0);
  levelText.textContent = `${sea.toLocaleString()} m`;
  modeText.textContent = isInverted ? "Inverted" : "Normal";
  const waterPct = waterLookup[seaIndex];
  waterText.textContent = `${waterPct.toFixed(1)}%`;
  landText.textContent = `${(100 - waterPct).toFixed(1)}%`;
}

function setSeaLevel(raw, immediate = false) {
  const parsed = Number(raw);
  const sea = clamp(Number.isFinite(parsed) ? Math.round(parsed) : 0, MIN_ELEV, MAX_ELEV);
  currentSea = sea;
  levelRange.value = String(sea);
  levelInput.value = String(sea);
  if (immediate) render(sea);
  else scheduleRender(sea);
}

function setSeaLevelFromSlider(raw) {
  const parsed = Number(raw);
  const stepped = Number.isFinite(parsed) ? Math.round(parsed / SLIDER_STEP) * SLIDER_STEP : 0;
  setSeaLevel(stepped);
}

function setInverted(enabled) {
  isInverted = enabled;
  scheduleRender(currentSea);
}

function scheduleRender(sea) {
  pendingSea = sea;
  if (renderFrame) return;
  const scheduler = window.requestAnimationFrame || ((callback) => window.setTimeout(callback, 0));
  renderFrame = scheduler(() => {
    renderFrame = 0;
    render(pendingSea);
  });
}

function setControlsEnabled(enabled) {
  levelRange.disabled = !enabled;
  levelInput.disabled = !enabled;
  invertToggle.disabled = !enabled;
  for (const button of presets.children) {
    button.disabled = !enabled;
  }
}

for (const action of LEVEL_ACTIONS) {
  const button = document.createElement("button");
  button.type = "button";
  button.textContent = action.label;
  if (action.level === 0) button.classList.add("reset-action");
  button.title = action.delta
    ? `Adjust sea level by ${action.label}`
    : "Reset sea level to 0m";
  button.disabled = true;
  button.addEventListener("click", () => {
    const nextLevel = action.delta ? currentSea + action.delta : action.level;
    setSeaLevel(nextLevel);
  });
  presets.appendChild(button);
}

levelRange.addEventListener("input", () => setSeaLevelFromSlider(levelRange.value));
levelInput.addEventListener("change", () => setSeaLevel(levelInput.value));
levelInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") setSeaLevel(levelInput.value);
});
invertToggle.addEventListener("change", () => setInverted(invertToggle.checked));

canvas.addEventListener("mousemove", (event) => {
  if (!elevations) return;
  const rect = canvas.getBoundingClientRect();
  const x = clamp(Math.floor(((event.clientX - rect.left) / rect.width) * WIDTH), 0, WIDTH - 1);
  const y = clamp(Math.floor(((event.clientY - rect.top) / rect.height) * HEIGHT), 0, HEIGHT - 1);
  const lon = -180 + ((x + 0.5) / WIDTH) * 360;
  const lat = 90 - ((y + 0.5) / HEIGHT) * 180;
  const sourceElev = elevations[y * WIDTH + x];
  const elev = isInverted ? -sourceElev : sourceElev;
  const ns = lat >= 0 ? "N" : "S";
  const ew = lon >= 0 ? "E" : "W";
  const sourceText = isInverted ? ` (${sourceElev.toLocaleString()} m source)` : "";
  cursorText.textContent = `${Math.abs(lat).toFixed(2)} ${ns}, ${Math.abs(lon).toFixed(2)} ${ew} | ${elev.toLocaleString()} m${sourceText}`;
});

canvas.addEventListener("mouseleave", () => {
  cursorText.textContent = "Move over map";
});

function initializeHeightmap() {
  try {
    prepareColorLuts();
    elevations = decodeHeightmapImage(heightmapImage);
    prepareDerivedData();
    setControlsEnabled(true);
    setSeaLevel(0, true);
  } catch (error) {
    console.error(error);
    modeText.textContent = "Missing";
    waterText.textContent = "...";
    landText.textContent = "...";
    cursorText.textContent = "Could not read world-heightmap-noaa-etopo5.png";
  }
}

heightmapImage.addEventListener("load", initializeHeightmap, { once: true });
heightmapImage.addEventListener("error", () => {
  modeText.textContent = "Missing";
  cursorText.textContent = "Could not load world-heightmap-noaa-etopo5.png";
}, { once: true });

if (heightmapImage.complete && heightmapImage.naturalWidth > 0) {
  initializeHeightmap();
}
</script>
